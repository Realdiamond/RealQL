# CodeRabbit AI Configuration
# https://coderabbit.ai/docs/configuration

language: "en-US"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: true
  review_status: true
  collapse_walkthrough: false
  path_instructions:
    - path: "**/*.tsx"
      instructions: |
        - Ensure components are functional and use React Server Components where possible, unless "use client" is declared.
        - Verify TailwindCSS classes follow the project's design system tokens from globals.css.
        - Look for proper accessibility (ARIA attributes) and semantic HTML.
    - path: "src/lib/types/**/*.ts"
      instructions: |
        - Ensure strict typing. Avoid "any" or "unknown" unless strictly necessary.
        - Verify recursive types (like QueryNode) are handled safely.
    - path: "src/store/**/*.ts"
      instructions: |
        - Ensure Zustand stores use immutable state updates.
        - Watch out for unnecessary re-renders in state selectors.
chat:
  auto_reply: true
